<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Login ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07111a;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.35);
    }
    .login-logo { font-size:1rem; font-weight:800; letter-spacing:-0.04em; color:#07111a; margin-bottom:10px; }
    .login-card h1 { font-size:2.2rem; line-height:0.95; letter-spacing:-0.08em; margin-bottom:32px; }
    .login-field { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
    .login-field label { font-size:0.78rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#030303; }
    .login-field input {
      padding:14px 16px; border:1.5px solid rgba(18,18,18,0.15); border-radius:12px;
      font:inherit; font-size:1rem; outline:none; transition:border-color 0.15s;
    }
    .login-field input:focus { border-color:#7ea8ff; }
    .login-btn {
      width:100%; padding:16px; background:#07111a; color:#fff; border:none;
      border-radius:12px; font:inherit; font-weight:800; font-size:1rem; cursor:pointer;
      margin-top:8px; transition:opacity 0.15s;
    }
    .login-btn:hover { opacity:0.88; }
    .login-error { margin-top:12px; color:#b3261e; font-size:0.9rem; font-weight:700; text-align:center; }

    /* ── Admin layout ── */
    .admin-wrap { padding:32px 52px 80px; }
    .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .admin-title { font-size:clamp(2rem,4vw,3rem); letter-spacing:-0.07em; line-height:0.95; }
    .btn-add {
      padding:14px 26px; background:#07111a; color:#fff; border:none;
      border-radius:999px; font:inherit; font-weight:800; font-size:0.9rem; cursor:pointer; transition:opacity 0.15s;
    }
    .btn-add:hover { opacity:0.85; }

    /* ── Car rows ── */
    .admin-list { display:flex; flex-direction:column; gap:10px; margin-bottom:40px; }
    .admin-row {
      display:grid; grid-template-columns:80px 1fr auto auto auto;
      align-items:center; gap:16px; background:#fff; border-radius:16px;
      padding:14px 20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); border:1px solid rgba(18,18,18,0.08);
    }
    .admin-thumb { width:80px; height:56px; border-radius:10px; object-fit:cover; }
    .admin-car-name { font-weight:800; font-size:0.98rem; letter-spacing:-0.03em; color:#111; }
    .admin-car-price { font-size:0.86rem; color:#b3261e; font-weight:700; margin-top:2px; }
    .abadge {
      padding:4px 12px; border-radius:999px; font-size:0.72rem; font-weight:800;
      letter-spacing:0.08em; text-transform:uppercase; color:#fff; white-space:nowrap;
    }
    .abadge.available { background:#0f8b52; }
    .abadge.sold { background:#b3261e; }
    .btn-edit {
      padding:8px 18px; background:#f0f0f0; color:#111; border:none;
      border-radius:999px; font:inherit; font-weight:700; font-size:0.82rem; cursor:pointer; transition:background 0.15s;
    }
    .btn-edit:hover { background:#e0e0e0; }
    .btn-del {
      padding:8px 18px; background:#fef2f2; color:#b3261e; border:1px solid #f5c6c6;
      border-radius:999px; font:inherit; font-weight:700; font-size:0.82rem; cursor:pointer; transition:background 0.15s;
    }
    .btn-del:hover { background:#fce8e8; }

    /* ── Form panel ── */
    .form-panel {
      background:#fff; border-radius:24px; padding:36px;
      border:1px solid rgba(18,18,18,0.1); box-shadow:0 8px 40px rgba(0,0,0,0.08);
    }
    .form-head {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid rgba(18,18,18,0.1);
    }
    .form-head-title { font-size:1.55rem; font-weight:800; letter-spacing:-0.05em; }
    .btn-cancel {
      padding:10px 20px; background:none; color:#676767;
      border:1px solid rgba(18,18,18,0.2); border-radius:999px;
      font:inherit; font-weight:700; font-size:0.86rem; cursor:pointer;
    }
    .btn-cancel:hover { background:#f5f5f5; }
    .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:24px; }
    .fgrid.three { grid-template-columns:1fr 1fr 1fr; }
    .ffield { display:flex; flex-direction:column; gap:8px; }
    .ffield label {
      font-size:0.76rem; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; color:#676767;
    }
    .ffield input, .ffield select, .ffield textarea {
      padding:13px 15px; border:1.5px solid rgba(18,18,18,0.15); border-radius:11px;
      font:inherit; font-size:0.94rem; outline:none; transition:border-color 0.15s; background:#fff;
    }
    .ffield input:focus, .ffield select:focus, .ffield textarea:focus { border-color:#7ea8ff; }
    .ffield textarea { resize:vertical; min-height:72px; }
    .full { grid-column:1/-1; }
    .fsection {
      font-size:0.95rem; font-weight:800; letter-spacing:-0.02em;
      margin:20px 0 14px; padding-top:16px; border-top:1px solid rgba(18,18,18,0.1);
    }
    /* Dynamic rows */
    .dlist { display:flex; flex-direction:column; gap:9px; margin-bottom:12px; }
    .spec-row { display:grid; grid-template-columns:1fr 1fr auto; gap:8px; align-items:center; }
    .hl-row   { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
    .spec-row input, .hl-row input {
      padding:10px 13px; border:1.5px solid rgba(18,18,18,0.15); border-radius:10px;
      font:inherit; font-size:0.9rem; outline:none;
    }

    .btn-rm {
      width:34px; height:34px; border-radius:50%; background:#fef2f2; color:#b3261e;
      border:1px solid #f5c6c6; cursor:pointer; font-size:1rem;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .btn-rm:hover { background:#fce8e8; }
    .btn-add-row {
      padding:7px 16px; background:#f0f0f0; color:#111; border:none;

    /* Image previews */
    .img-prev-main { width:100%; height:160px; object-fit:cover; border-radius:12px; margin-top:10px; display:none; }
    .img-prev-main.on { display:block; }
    .sec-previews { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
    .sec-thumb-wrap { position:relative; }
    .sec-thumb-wrap img { width:100%; height:70px; object-fit:cover; border-radius:8px; display:block; }
    .sec-thumb-del {

      background:rgba(0,0,0,0.55); color:#fff; border:none; font-size:14px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; line-height:1; padding:0;
    }
    .sec-thumb-del:hover { background:#b3261e; }
    /* Form actions */
    .factions { display:flex; align-items:center; gap:14px; margin-top:28px; padding-top:24px; border-top:1px solid rgba(18,18,18,0.1); }
    .btn-save {

    .amsg { font-size:0.88rem; font-weight:700; }

    .amsg.err { color:#b3261e; }
    .no-cars { text-align:center; padding:60px 20px; color:#676767; }

    @media (max-width:900px) {

      .admin-row .abadge, .admin-row .btn-edit { display:none; }
      .fgrid, .fgrid.three { grid-template-columns:1fr; }
      .spec-row { grid-template-columns:1fr auto; }
      .spec-row input:first-child { display:none; }
    }
    @media (max-width:640px) {
      .admin-row { grid-template-columns:52px 1fr auto; }
      .sec-previews { grid-template-columns:repeat(3,1fr); }
    }

    async function readDb() {
      try {
        const res = await fetch("/data/cars.json?_=" + Date.now());
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.cars)) return data.cars;
        }
      } catch(_) {}
      return [];
    }

    async function writeDb(cars) {
      const res = await fetch("/.netlify/functions/save-cars", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ type: "save-cars", cars })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || "Error al guardar (codigo " + res.status + ")");
      }
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Error al leer imagen"));
        reader.onload  = e => {
          const img = new Image();
          img.onerror = () => reject(new Error("Error al procesar imagen"));
          img.onload  = () => {
            const MAX = 1200;
            let w = img.naturalWidth, h = img.naturalHeight;
            if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.78));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function uploadImage(file) {
      const base64   = await compressImage(file);
      const safeName = Date.now() + "_" + file.name.replace(/\s+/g, "_").replace(/[^a-zA-Z0-9._-]/g, "");
      const res = await fetch("/.netlify/functions/save-cars", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ type: "upload-image", filename: safeName, base64 })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || "Error al subir imagen");
      }
      const data = await res.json();
      return data.path; // "imagenes/timestamp_nombre.jpg"
    }

    function escH(s) {
      return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── Auth ── */

    function showLogin() {

    }

    document.getElementById("loginForm").addEventListener("submit", e => {
      e.preventDefault();

      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem("adminOk", "1");
        showAdmin();
      } else {
        document.getElementById("lError").style.display = "block";

    /* ── Load & render list ── */
    async function loadCars() {
      const raw = await readDb();
      let needsSave = false;
      carsCache = (Array.isArray(raw) ? raw : []).map(c => {
        const def = DEFAULTS.find(d => d.name === c.name);
        if (!c.id) {
          c.id = def ? def.id : Date.now();
          needsSave = true;
        }
        if (def) {
          if (!c.specs      && def.specs)      { c.specs      = def.specs;      needsSave = true; }
          if (!c.highlights && def.highlights)  { c.highlights = def.highlights; needsSave = true; }
          if (!c.price      && def.price)      { c.price      = def.price;      needsSave = true; }
          if (!c.priceType  && def.priceType)  { c.priceType  = def.priceType;  needsSave = true; }
        }
        return c;
      });
      if (needsSave) await writeDb(carsCache);
      renderList();
    }

    function displayPrice(car) {
      if (car.price) return car.price + (car.priceType ? " — " + car.priceType : "");
      const m = (car.description||"").match(/^(Q[\d,]+[^.]*)\./);
      return m ? m[1] : "—";
    }

    function renderList() {
      const el = document.getElementById("adminList");
      if (!carsCache.length) {
        el.innerHTML = '<p class="no-cars">No hay carros. Agrega el primero.</p>';
        return;
      }
      el.innerHTML = carsCache.map((car, i) => `
        <div class="admin-row">
          <img class="admin-thumb" src="${escH(car.mainImage)}" alt="${escH(car.name)}">
          <div>
            <div class="admin-car-name">${escH(car.name)}</div>
            <div class="admin-car-price">${escH(displayPrice(car))}</div>
          </div>
          <span class="abadge ${car.status==="Vendido"?"sold":"available"}">${escH(car.status)}</span>
          <button class="btn-edit" onclick="openEdit(${i})">Editar</button>
          <button class="btn-del"  onclick="delCar(${i})">Eliminar</button>
        </div>`
      ).join("");
    }

    /* ── Delete ── */
    async function delCar(i) {
      if (!confirm("¿Eliminar este carro? No se puede deshacer.")) return;
      const target = carsCache[i]; if (!target) return;
      const freshDb  = await readDb();
      let freshCars  = (Array.isArray(freshDb) ? freshDb : carsCache.slice()).filter(c => c.id !== target.id);
      await writeDb(freshCars);
      carsCache = freshCars;
      renderList();
      closeForm();
    }

    /* ── Spec / highlight rows ── */
    function makeSpecRow(label = "", value = "") {
      const d = document.createElement("div");
      d.className = "spec-row";
      d.innerHTML = `
        <input type="text" placeholder="Caracteristica (Ej: Motor)" value="${escH(label)}">
        <input type="text" placeholder="Valor (Ej: V6 4.0L)" value="${escH(value)}">
        <button type="button" class="btn-rm" onclick="this.parentElement.remove()">×</button>`;
      return d;
    }

    function makeHlRow(text = "") {
      const d = document.createElement("div");
      d.className = "hl-row";
      d.innerHTML = `
        <input type="text" placeholder="Ej: Motor en excelente estado" value="${escH(text)}">
        <button type="button" class="btn-rm" onclick="this.parentElement.remove()">×</button>`;
      return d;
    }

    function makeNegRow(text = "") {
      const d = document.createElement("div");
      d.className = "hl-row";
      d.innerHTML = `
        <input type="text" placeholder="Ej: Detalle de pintura en puerta trasera" value="${escH(text)}">
        <button type="button" class="btn-rm" onclick="this.parentElement.remove()">×</button>`;
      return d;
    }

    document.getElementById("btnAddSpec").addEventListener("click", () =>
      document.getElementById("specsList").appendChild(makeSpecRow()));
    document.getElementById("btnAddHl").addEventListener("click", () =>
      document.getElementById("hlList").appendChild(makeHlRow()));
    document.getElementById("btnAddNeg").addEventListener("click", () =>
      document.getElementById("negList").appendChild(makeNegRow()));

    /* ── Image previews ── */
    document.getElementById("fMain").addEventListener("change", e => {
      const f = e.target.files[0]; if (!f) return;
      pendingMainFile = f;
      const prev = document.getElementById("prevMain");
      prev.src = URL.createObjectURL(f);
      prev.classList.add("on");
    });

    function renderSecPreviews() {
      const cont = document.getElementById("prevSecondary");
      cont.innerHTML = "";
      secImagesArr.forEach((item, i) => {
        const wrap = document.createElement("div");
        wrap.className = "sec-thumb-wrap";
        const img = document.createElement("img");
        img.src = item instanceof File ? URL.createObjectURL(item) : item;
        const del = document.createElement("button");
        del.type = "button";
        del.className = "sec-thumb-del";
        del.textContent = "×";
        del.addEventListener("click", () => { secImagesArr.splice(i, 1); renderSecPreviews(); });
        wrap.appendChild(img);
        wrap.appendChild(del);
        cont.appendChild(wrap);
      });
    }

    document.getElementById("btnAddSecPhotos").addEventListener("click", () => {
      document.getElementById("fSecondary").click();
    });

    document.getElementById("fSecondary").addEventListener("change", e => {
      const files = Array.from(e.target.files);
      for (const f of files) secImagesArr.push(f);
      renderSecPreviews();
      e.target.value = "";
    });

    /* ── Open / close form ── */
    document.getElementById("btnAddCar").addEventListener("click", () => {
      editingId = null;
      document.getElementById("formTitle").textContent = "Nuevo carro";
      resetForm();
      showFormPanel();
    });

    document.getElementById("btnCancel").addEventListener("click", closeForm);

    function showFormPanel() {
      const p = document.getElementById("formPanel");
      p.style.display = "block";
      p.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function closeForm() {
      document.getElementById("formPanel").style.display = "none";
      resetForm();
    }

    function resetForm() {
      document.getElementById("adminCarForm").reset();
      document.getElementById("fId").value = "";
      document.getElementById("prevMain").classList.remove("on");
      document.getElementById("prevMain").src = "";
      pendingMainFile = null;
      secImagesArr = [];
      document.getElementById("prevSecondary").innerHTML = "";
      document.getElementById("specsList").innerHTML = "";
      document.getElementById("hlList").innerHTML = "";
      document.getElementById("negList").innerHTML = "";
      document.getElementById("amsg").textContent = "";
      document.getElementById("amsg").className = "amsg";
    }

    function openEdit(i) {
      const car = carsCache[i]; if (!car) return;
      editingId = car.id;
      pendingMainFile = null;
      document.getElementById("formTitle").textContent = "Editar carro";
      document.getElementById("fId").value     = car.id;
      document.getElementById("fName").value   = car.name || "";
      document.getElementById("fYear").value   = car.year || "";
      document.getElementById("fStatus").value = car.status || "Disponible";
      document.getElementById("fPrice").value  = car.price || "";
      document.getElementById("fPriceType").value = car.priceType || "Negociable";
      document.getElementById("fDesc").value   = car.bodyDescription || "";

      if (car.mainImage) {
        const prev = document.getElementById("prevMain");
        prev.src = car.mainImage;
        prev.classList.add("on");
      }

      secImagesArr = [...(car.secondaryImages || [])]; // strings (rutas)
      renderSecPreviews();

      const sl = document.getElementById("specsList");
      sl.innerHTML = "";
      (car.specs || []).forEach(s => sl.appendChild(makeSpecRow(s.label, s.value)));

      const hl = document.getElementById("hlList");
      hl.innerHTML = "";
      (car.highlights || []).forEach(h => hl.appendChild(makeHlRow(h)));

      const nl = document.getElementById("negList");
      nl.innerHTML = "";
      (car.negatives || []).forEach(n => nl.appendChild(makeNegRow(n)));

      showFormPanel();
    }

    /* ── Save ── */
    document.getElementById("adminCarForm").addEventListener("submit", async e => {
      e.preventDefault();
      const msgEl = document.getElementById("amsg");
      msgEl.textContent = "Guardando..."; msgEl.className = "amsg";

      try {
        const specs = Array.from(document.getElementById("specsList").querySelectorAll(".spec-row")).map(row => {
          const inp = row.querySelectorAll("input");
          return { label: inp[0].value.trim(), value: inp[1].value.trim() };
        }).filter(s => s.label || s.value);

        const highlights = Array.from(document.getElementById("hlList").querySelectorAll(".hl-row input"))
          .map(i => i.value.trim()).filter(Boolean);

        const negatives = Array.from(document.getElementById("negList").querySelectorAll(".hl-row input"))
          .map(i => i.value.trim()).filter(Boolean);

        // Imagen principal
        let mainImage = null;
        if (editingId !== null) {
          const existing = carsCache.find(c => c.id === editingId);
          if (existing) mainImage = existing.mainImage || null;
        }
        if (pendingMainFile) {
          msgEl.textContent = "Subiendo foto principal...";
          mainImage = await uploadImage(pendingMainFile);
        }

        if (!mainImage) {
          msgEl.textContent = "Debes agregar una foto principal."; msgEl.className = "amsg err"; return;
        }

        // Fotos secundarias: subir las que son File, mantener las rutas existentes
        const secondaryImages = [];
        let idx = 0;
        for (const item of secImagesArr) {
          if (item instanceof File) {
            idx++;
            msgEl.textContent = "Subiendo foto " + idx + "...";
            secondaryImages.push(await uploadImage(item));
          } else {
            secondaryImages.push(item);
          }
        }

        const price     = document.getElementById("fPrice").value.trim();
        const priceType = document.getElementById("fPriceType").value;

        const car = {
          id:              editingId !== null ? editingId : Date.now(),
          name:            document.getElementById("fName").value.trim(),
          year:            document.getElementById("fYear").value.trim(),
          status:          document.getElementById("fStatus").value,
          price, priceType, mainImage, secondaryImages, specs, highlights, negatives,
          bodyDescription: document.getElementById("fDesc").value.trim(),
          description:     price ? price + " — " + priceType + ". " : ""
        };

        msgEl.textContent = "Guardando datos...";
        const freshCars = await readDb();
        let updated = Array.isArray(freshCars) ? freshCars : [];

        if (editingId !== null) {
          const i = updated.findIndex(c => c.id === editingId);
          if (i !== -1) updated[i] = car; else updated.unshift(car);
        } else {
          updated.unshift(car);
        }

        await writeDb(updated);
        carsCache = updated;
        renderList();
        msgEl.textContent = "¡Guardado! La pagina se actualiza en ~30 segundos en todos los dispositivos.";
        msgEl.className = "amsg ok";
        setTimeout(closeForm, 2800);
      } catch (err) {
        msgEl.textContent = err.message || "Error al guardar.";
        msgEl.className = "amsg err";
      }
    });

    /* ── Init ── */
    if (isLogged()) showAdmin(); else showLogin();
  </script>
</body>
</html>
