<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mazda 3 2005 – Autos Xela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">

    <nav class="site-nav">
      <div class="nav-shell">
        <a href="index.html" class="nav-brand">AUTOS XELA</a>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Inicio</a>
          <a href="#contacto" class="nav-link">Contacto</a>
        </div>
        <a class="whatsapp-nav-btn" href="https://wa.me/50238247165" target="_blank" rel="noopener noreferrer">WhatsApp</a>
      </div>
    </nav>

    <div class="car-page-wrapper" id="carPage">
      <p class="car-loading">Cargando...</p>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
      <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar">&times;</button>
      <button class="lightbox-prev" id="lightboxPrev" aria-label="Anterior">&#8592;</button>
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <button class="lightbox-next" id="lightboxNext" aria-label="Siguiente">&#8594;</button>
      <span class="lightbox-counter" id="lightboxCounter"></span>
    </div>

    <footer id="contacto" class="site-footer">
      <div class="footer-shell">
        <div class="footer-main-grid">
          <div class="footer-brand-col">
            <span class="footer-brand">AUTOS XELA</span>
            <p>Quetzaltenango, Guatemala</p>
            <p>+502 38247165</p>
            <a class="footer-wa-inline" href="https://wa.me/50238247165" target="_blank" rel="noopener noreferrer">Escribir por WhatsApp →</a>
          </div>
          <div class="footer-column">
            <h3>Horario</h3>
            <p>Lunes a viernes: 8:00 – 18:00</p>
            <p>Sabado: 8:00 – 15:00</p>
            <p>Domingo: con cita previa</p>
          </div>
        </div>
        <div class="footer-bottom">
          <p>© 2026 Autos Xela · Quetzaltenango, Guatemala</p>
          <a class="footer-whatsapp" href="https://wa.me/50238247165" target="_blank" rel="noopener noreferrer">Contactar por WhatsApp</a>
        </div>
      </div>
    </footer>

  </div>

  <script>
    /* ── Datos del Mazda 3 2005 ── */
    const CAR_NAME = "Mazda 3 2005";

    const CAR_SPECS = [
      { label: "Año",         value: "2005" },
      { label: "Color",       value: "Gris" },
      { label: "Motor",       value: "2.3L DOHC" },
      { label: "Cilindros",   value: "4 en linea" },
      { label: "Transmision", value: "Automatica Tiptronic" },
      { label: "Traccion",    value: "Delantera (FWD)" },
      { label: "Combustible", value: "Gasolina" },
      { label: "Pasajeros",   value: "5" },
      { label: "Direccion",   value: "Asistida" },
      { label: "A/C",         value: "Si" }
    ];

    const CAR_HIGHLIGHTS = [
      "Motor 2.3L al 100%, sin humo ni corrosion",
      "Transmision automatica Tiptronic",
      "Suspension ajustada recientemente",
      "Aire acondicionado funcionando correctamente",
      "Interior espacioso para 5 pasajeros",
      "Llantas con aprox. 50% de vida util",
      "Economico de mantener, ideal para uso diario",
      "Detalles esteticos de pintura en bumper y capo"
    ];

    /* ── DB ── */
    const storageKey = "carros-page-inventory";
    const dbName    = "carros-page-db";
    const storeName = "inventario";

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(dbName, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror  = () => reject(new Error("No se pudo abrir la base de datos."));
      });
    }

    async function readInventoryFromDb() {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction(storeName, "readonly");
        const req = tx.objectStore(storeName).get(storageKey);
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(new Error("No se pudo leer el inventario."));
      });
    }

    /* ── Lightbox ── */
    let lightboxImages = [];
    let lightboxIndex  = 0;
    const lightbox    = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxCnt = document.getElementById("lightboxCounter");

    function openLightbox(index) {
      lightboxIndex = ((index % lightboxImages.length) + lightboxImages.length) % lightboxImages.length;
      lightboxImg.src = lightboxImages[lightboxIndex];
      lightboxCnt.textContent = (lightboxIndex + 1) + " / " + lightboxImages.length;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    function stepLightbox(delta) { openLightbox(lightboxIndex + delta); }

    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
    document.getElementById("lightboxPrev").addEventListener("click", () => stepLightbox(-1));
    document.getElementById("lightboxNext").addEventListener("click", () => stepLightbox(1));
    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "Escape")     closeLightbox();
      if (e.key === "ArrowLeft")  stepLightbox(-1);
      if (e.key === "ArrowRight") stepLightbox(1);
    });

    /* ── Render ── */
    function parsePriceFromDescription(description) {
      const match = description.match(/^(Q[\d,]+[^.]*)\.\s*/);
      if (match) return { price: match[1].trim(), body: description.slice(match[0].length) };
      return { price: null, body: description };
    }

    function renderCar(car) {
      const carPage     = document.getElementById("carPage");
      const statusClass = (car.status || "").toLowerCase() === "vendido" ? "sold" : "available";
      const descParsed  = parsePriceFromDescription(car.description || "");
      const displayPrice = car.price || descParsed.price;
      const priceNote    = car.priceType || "Precio fijo";
      const specs       = (car.specs && car.specs.length) ? car.specs : CAR_SPECS;
      const highlights  = (car.highlights && car.highlights.length) ? car.highlights : CAR_HIGHLIGHTS;

      lightboxImages = [car.mainImage, ...(car.secondaryImages || [])];

      const galleryHTML = (car.secondaryImages || []).map((src, i) =>
        `<img src="${src}" alt="Foto ${i + 1}" loading="lazy" data-lb="${i + 1}">`
      ).join("") || `<p style="color:var(--muted);grid-column:1/-1;padding:12px 0;">Sin fotos adicionales.</p>`;

      const specsHTML = specs.map(s =>
        `<div class="spec-item">
          <span class="spec-item-label">${s.label}</span>
          <span class="spec-item-value">${s.value}</span>
        </div>`
      ).join("");

      const highlightsHTML = highlights.map(h => `<li>${h}</li>`).join("");
      const negativesHTML  = (car.negatives || []).map(n => `<li>${n}</li>`).join("");

      const priceBlock = displayPrice
        ? `<span class="sidebar-label">Precio</span>
           <p class="sidebar-price">${displayPrice}</p>
           <p class="sidebar-price-note">${priceNote}</p>
           <div class="sidebar-divider"></div>`
        : "";

      carPage.innerHTML = `
        <button class="car-back-btn" onclick="history.back()">&#8592; Volver al inventario</button>

        <div class="car-page-hero">
          <img src="${car.mainImage}" alt="${car.name}" data-lb="0" style="cursor:zoom-in;">
          <div class="car-page-hero-footer">
            <h1 class="car-page-name">${car.name}</h1>
            <span class="car-page-status ${statusClass}">${car.status}</span>
          </div>
        </div>

        <div class="car-page-body">
          <div class="car-page-left">
            ${car.bodyDescription ? `<p class="car-body-description">${car.bodyDescription}</p>` : ""}
            <div class="car-page-gallery">${galleryHTML}</div>
            <div class="specs-section">
              <h3 class="specs-section-title">Especificaciones tecnicas</h3>
              <div class="car-specs-grid">${specsHTML}</div>
            </div>
          </div>

          <aside class="car-page-sidebar">
            ${priceBlock}
            <span class="sidebar-label">Vehiculo</span>
            <h2 class="sidebar-car-name">${car.name}</h2>
            <span class="sidebar-status ${statusClass}">${car.status}</span>

            <div class="sidebar-divider"></div>
            ${highlightsHTML ? `<span class="sidebar-label">Puntos destacados</span><ul class="car-highlights">${highlightsHTML}</ul>` : ""}
            ${negativesHTML  ? `<div class="sidebar-divider"></div><span class="sidebar-label">Detalles a considerar</span><ul class="car-negatives">${negativesHTML}</ul>` : ""}
            <div class="sidebar-divider"></div>

            <span class="sidebar-contact-label">Contacto</span>
            <a class="contact-btn wa"
               href="https://wa.me/50238247165?text=Hola%2C%20me%20interesa%20el%20${encodeURIComponent(car.name)}"
               target="_blank" rel="noopener noreferrer">
              Escribir por WhatsApp
            </a>
            <a class="contact-btn phone" href="tel:+50238247165">
              Llamar: +502 3824 7165
            </a>
          </aside>
        </div>
      `;

      carPage.querySelectorAll("[data-lb]").forEach(el => {
        el.addEventListener("click", () => openLightbox(parseInt(el.dataset.lb, 10)));
      });
    }

    function renderError(msg) {
      document.getElementById("carPage").innerHTML =
        `<p style="text-align:center;padding:80px 20px;color:var(--muted);">${msg}</p>
         <div style="text-align:center;margin-top:16px;">
           <a href="inventario.html" style="color:var(--blue);font-weight:700;">Volver al inventario</a>
         </div>`;
    }

    async function init() {
      try {
        const cars = await readInventoryFromDb();
        if (!Array.isArray(cars)) { renderError("No se pudo cargar."); return; }
        const idParam = new URLSearchParams(window.location.search).get("id");
        let car;
        if (idParam) {
          const numId = parseFloat(idParam);
          car = cars.find(c => c.id === numId) || cars.find(c => c.name === CAR_NAME);
        } else {
          car = cars.find(c => c.name === CAR_NAME);
        }
        if (!car) { renderError("Carro no encontrado."); return; }
        renderCar(car);
      } catch (_) {
        renderError("Error al cargar el carro.");
      }
    }

    init();
  </script>
</body>
</html>
